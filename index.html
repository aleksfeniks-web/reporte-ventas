<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reporte de Venta y Prospección</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--red:#C0392B;--dark:#1a1a1a;--surface:#f5f4f0;--card:#fff;--border:#e0ddd7;--muted:#888;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--dark);min-height:100vh;padding-bottom:110px;}
  header{background:var(--dark);color:#fff;padding:16px 20px 14px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--red);}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;line-height:1;}
  header p{font-size:11px;color:#aaa;margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
  .container{padding:16px;max-width:480px;margin:0 auto;}
  .tabs{display:flex;background:var(--dark);border-radius:10px;padding:4px;margin-bottom:20px;gap:2px;}
  .tab{flex:1;padding:9px 6px;border:none;background:transparent;color:#888;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:7px;cursor:pointer;transition:all .2s;}
  .tab.active{background:var(--red);color:#fff;}
  .card{background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--red);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .field{margin-bottom:13px;}
  label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;}
  input[type=text],input[type=date],input[type=tel]{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:15px;background:var(--surface);color:var(--dark);transition:border-color .2s;-webkit-appearance:none;}
  input:focus{outline:none;border-color:var(--red);background:#fff;}
  .check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .check-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all .15s;user-select:none;}
  .check-item.checked{background:#fff5f5;border-color:var(--red);}
  .check-box{width:20px;height:20px;border:2px solid #ccc;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
  .check-item.checked .check-box{background:var(--red);border-color:var(--red);}
  .check-box svg{display:none;}
  .check-item.checked .check-box svg{display:block;}
  .check-label{font-size:13px;font-weight:500;line-height:1.2;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  #otroText{margin-top:8px;display:none;}
  #otroText.visible{display:block;}
  .entry-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;position:relative;}
  .entry-name{font-weight:600;font-size:15px;margin-bottom:4px;}
  .entry-meta{font-size:12px;color:var(--muted);line-height:1.7;}
  .entry-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .tag{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;}
  .tag-tipo{background:#fde8e8;color:var(--red);}
  .tag-motivo{background:#e8f4fd;color:#1a6fa8;}
  .tag-vol{background:#e8fde8;color:#1a7a1a;}
  .entry-delete{position:absolute;top:12px;right:12px;background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:2px 6px;border-radius:5px;}
  .entry-delete:hover{background:#fde8e8;color:var(--red);}
  .action-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;}
  .btn{flex:1;padding:14px;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-add{background:var(--dark);color:#fff;}
  .btn-export{background:var(--red);color:#fff;}
  .btn-export:disabled{background:#ccc;cursor:not-allowed;}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-text{font-size:14px;line-height:1.5;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .count-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;border-radius:20px;font-size:12px;font-weight:700;padding:2px 8px;margin-left:8px;}
  .hidden{display:none;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid #fff6;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1>Reporte de Venta y Prospección</h1>
  <p>Registro Diario de Campo</p>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('form')">📝 Registro</button>
    <button class="tab" onclick="showTab('list')">📋 Entradas <span class="count-badge" id="countBadge">0</span></button>
  </div>

  <div id="tabForm">
    <div class="card">
      <div class="card-title">📅 Información General</div>
      <div class="field"><label>Fecha</label><input type="date" id="fecha"/></div>
      <div class="field"><label>Nombre — Cliente o Prospecto</label><input type="text" id="nombre" placeholder="Nombre completo"/></div>
      <div class="field"><label>Razón Social</label><input type="text" id="razonSocial" placeholder="Ej: Particular"/></div>
      <div class="field"><label>Nombre de la Obra</label><input type="text" id="nombreObra" placeholder="Ej: Casa Habitación"/></div>
      <div class="two-col">
        <div class="field"><label>Teléfono</label><input type="tel" id="telefono" placeholder="10 dígitos"/></div>
        <div class="field"><label>Ubicación</label><input type="text" id="ubicacion" placeholder="Colonia / Zona"/></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🏗️ Tipo de Actividad</div>
      <div class="check-grid">
        <div class="check-item" data-group="tipo" data-val="Obra" onclick="toggleCheck(this)"><div class="check-box"><svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div><span class="check-label">Obra</span></div>
        <div class="check-item" data-group="tipo" data-val="Autoconstruccion" onclick="toggleCheck(this)"><div class="check-box"><svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div><span class="check-label">Auto Construcción</span></div>
        <div class="check-item" data-group="tipo" data-val="Reventa" onclick="toggleCheck(this)"><div class="check-box"><svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div><span class="check-label">Reventa</span></div>
        <div class="check-item" data-group="tipo" data-val="Evento" onclick="toggleCheck(this)"><div class="check-box"><svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div><span class="check-label">Evento</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📌 Motivo de Contacto</div>
      <div class="check-grid">
        <div class="check-item" data-group="motivo" data-val="Referencia" onclick="toggleCheck(this)"><div class="check-box"><svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div><span class="check-label">Referencia</span></div>
        <div class="check-item" data-group="motivo" data-val="Visita" onclick="toggleCheck(this)"><div class="check-box"><svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div><span class="check-label">Visita</span></div>
        <div class="check-item" data-group="motivo" data-val="Red Social" onclick="toggleCheck(this)"><div class="check-box"><svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div><span class="check-label">Red Social</span></div>
        <div class="check-item" data-group="motivo" data-val="Otro" onclick="toggleCheck(this);toggleOtro(this)"><div class="check-box"><svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div><span class="check-label">Otro</span></div>
      </div>
      <div id="otroText"><input type="text" id="otroDetalle" placeholder="Especificar..."/></div>
    </div>
    <div class="card">
      <div class="card-title">📦 Volúmenes</div>
      <div class="two-col">
        <div class="field"><label>M³ Concreto o Potenciales</label><input type="text" id="m3Concreto" placeholder="Ej: 10m3, Pte."/></div>
        <div class="field"><label>No Venta Block o Potenciales</label><input type="text" id="noVentaBlock" placeholder="Ej: 1500"/></div>
      </div>
    </div>
  </div>

  <div id="tabList" class="hidden">
    <div id="entriesList">
      <div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sin entradas aún.<br>Registra clientes en la pestaña <strong>Registro</strong>.</div></div>
    </div>
  </div>
</div>

<div class="action-bar">
  <button class="btn btn-add" onclick="addEntry()">+ Agregar</button>
  <button class="btn btn-export" id="exportBtn" onclick="exportExcel()" disabled>⬇ Exportar Excel</button>
</div>
<div class="toast" id="toast"></div>

<script>
let entries = [];
document.getElementById('fecha').valueAsDate = new Date();

function showTab(tab) {
  document.getElementById('tabForm').classList.toggle('hidden', tab !== 'form');
  document.getElementById('tabList').classList.toggle('hidden', tab !== 'list');
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='form')||(i===1&&tab==='list')));
  if (tab==='list') renderList();
}
function toggleCheck(el){ el.classList.toggle('checked'); }
function toggleOtro(el){ document.getElementById('otroText').classList.toggle('visible', el.classList.contains('checked')); }
function getChecked(group){ return [...document.querySelectorAll(`.check-item[data-group="${group}"].checked`)].map(el=>el.dataset.val); }
function fmtDate(v){ if(!v)return''; const d=new Date(v+'T12:00:00'); return d.toLocaleDateString('es-MX',{day:'2-digit',month:'numeric',year:'numeric'}); }

function addEntry(){
  const fecha=document.getElementById('fecha').value;
  const nombre=document.getElementById('nombre').value.trim();
  if(!fecha||!nombre){ showToast('⚠️ Fecha y Nombre son requeridos'); return; }
  entries.push({ id:Date.now(), fecha, nombre,
    razonSocial:document.getElementById('razonSocial').value.trim(),
    nombreObra:document.getElementById('nombreObra').value.trim(),
    telefono:document.getElementById('telefono').value.trim(),
    ubicacion:document.getElementById('ubicacion').value.trim(),
    tipos:getChecked('tipo'), motivos:getChecked('motivo'),
    otroDetalle:document.getElementById('otroDetalle').value.trim(),
    m3Concreto:document.getElementById('m3Concreto').value.trim(),
    noVentaBlock:document.getElementById('noVentaBlock').value.trim(),
  });
  resetForm(); updateCount(); showToast('✅ Entrada agregada'); showTab('list');
}
function resetForm(){
  ['nombre','razonSocial','nombreObra','telefono','ubicacion','m3Concreto','noVentaBlock','otroDetalle'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('.check-item').forEach(el=>el.classList.remove('checked'));
  document.getElementById('otroText').classList.remove('visible');
}
function deleteEntry(id){ entries=entries.filter(e=>e.id!==id); updateCount(); renderList(); }
function updateCount(){ document.getElementById('countBadge').textContent=entries.length; document.getElementById('exportBtn').disabled=entries.length===0; }
function renderList(){
  const c=document.getElementById('entriesList');
  if(!entries.length){ c.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sin entradas aún.</div></div>'; return; }
  c.innerHTML=entries.map(e=>`
    <div class="entry-card">
      <button class="entry-delete" onclick="deleteEntry(${e.id})">✕</button>
      <div class="entry-name">${e.nombre}</div>
      <div class="entry-meta">📅 ${fmtDate(e.fecha)}${e.razonSocial?'<br>🏢 '+e.razonSocial:''}${e.nombreObra?' · 🏗️ '+e.nombreObra:''}${e.telefono?'<br>📞 '+e.telefono:''}${e.ubicacion?' · 📍 '+e.ubicacion:''}</div>
      <div class="entry-tags">
        ${e.tipos.map(t=>`<span class="tag tag-tipo">${t}</span>`).join('')}
        ${e.motivos.map(m=>`<span class="tag tag-motivo">${m==='Otro'&&e.otroDetalle?e.otroDetalle:m}</span>`).join('')}
        ${e.m3Concreto?`<span class="tag tag-vol">🪨 ${e.m3Concreto}</span>`:''}
        ${e.noVentaBlock?`<span class="tag tag-vol">🧱 ${e.noVentaBlock}</span>`:''}
      </div>
    </div>`).join('');
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

async function exportExcel(){
  const btn=document.getElementById('exportBtn');
  btn.innerHTML='<span class="spinner"></span>Generando...';
  btn.disabled=true;
  const byDate={};
  entries.forEach(e=>{ if(!byDate[e.fecha]) byDate[e.fecha]=[]; byDate[e.fecha].push(e); });
  try {
    const res=await fetch('/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entries_by_date:byDate})});
    if(!res.ok) throw new Error();
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const today=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
    a.download=`REPORTE_VENTAS_${today}.xlsx`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📥 Excel descargado');
  } catch(err){
    showToast('❌ Error al generar Excel');
  } finally {
    btn.innerHTML='⬇ Exportar Excel';
    btn.disabled=entries.length===0;
  }
}
</script>
</body>
</html>
